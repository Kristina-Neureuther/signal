<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signal - Systems Thinking & Noise Filter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0f1d; /* Tiefes, edles Dunkelblau */
            overflow: hidden;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            user-select: none;
        }
        
        /* Der Textblock oben (alles sauber an einem Ort) */
        .header-section {
            position: absolute;
            top: 8%;
            width: 100%;
            text-align: center;
            color: #e0e6ed;
            pointer-events: none;
            z-index: 10;
        }

        .headline {
            display: block;
            font-size: 2.2rem;
            font-weight: 300;
            letter-spacing: 1px;
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        .subheadline {
            display: block;
            font-size: 1.4rem;
            color: #8a99ad;
            margin-top: 6px;
            font-style: italic;
        }

        /* Die Anleitung, jetzt ebenfalls elegant oben integriert */
        .instructions {
            display: block;
            font-size: 0.95rem;
            color: #5c697a;
            margin-top: 18px;
            letter-spacing: 0.5px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    
    <span class="instructions">
        Ignore the chaos. Focus your eyes entirely on the steady golden node.<br>
        Train your mind to see structure within complexity.
    </span>
</div>

<script>
let noiseParticles = [];
const numParticles = 240; // Menge des grauen Hintergrund-Rauschens
let signalAngle = 0;
let signalSpeed = 0.018; // Fließende Geschwindigkeit für die Schleife

function setup() {
    createCanvas(windowWidth, windowHeight);
    
    // Erzeuge das chaotische graue Hintergrundrauschen
    for (let i = 0; i < numParticles; i++) {
        noiseParticles.push({
            x: random(width),
            y: random(height),
            vx: random(-1.5, 1.5),
            vy: random(-1.5, 1.5),
            size: random(2.5, 4.5)
        });
    }
}

function draw() {
    // Ein kleiner Alpha-Wert (35) sorgt für den fließenden goldenen Schweifeffekt
    background(10, 15, 29, 35); 
    
    // 1. CHAOS ZEICHNEN (Graue Noise-Punkte)
    fill(120, 130, 145, 45); 
    noStroke();
    for (let p of noiseParticles) {
        p.x += p.vx + random(-0.3, 0.3);
        p.y += p.vy + random(-0.3, 0.3);
        
        if (p.x < 0) p.x = width;
        if (p.x > width) p.x = 0;
        if (p.y < 0) p.y = height;
        if (p.y > height) p.y = 0;
        
        ellipse(p.x, p.y, p.size, p.size);
    }
    
    // 2. SIGNAL ZEICHNEN (Goldener Unendlichkeits-Punkt)
    signalAngle += signalSpeed;
    
    let centerX = width / 2;
    let centerY = height * 0.58; // Etwas nach unten gesetzt, damit Platz für den Text oben ist
    
    // Mathematische Lemniskate (Perfekte Unendlichkeits-Schleife)
    let scaleFactor = width * 0.32; 
    let denom = 1 + sin(signalAngle) * sin(signalAngle);
    let x = centerX + (scaleFactor * cos(signalAngle)) / denom;
    let y = centerY + (scaleFactor * sin(signalAngle) * cos(signalAngle)) / denom * 1.5;
    
    // Reines Gold mit Glow-Effekt
    fill(255, 215, 0, 25); // Äußerer Glow
    ellipse(x, y, 60, 60);
    
    fill(255, 215, 0, 60); // Innerer Glow
    ellipse(x, y, 40, 40);
    
    fill(255, 230, 100); // Heller Kern
    ellipse(x, y, 22, 22);
}

function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
}
</script>

</body>
</html>
